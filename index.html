<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
      }

      .wd-toolbox {
        width: 140px;
        min-height: 100vh;
        background: #f5f5f5;
        border-right: 1px solid #e5e5e5;
        padding: 1.25rem 0.75rem;
        flex-shrink: 0;
      }

      .wd-canvas {
        flex: 1;
        max-width: 500px;
        margin: 4rem auto;
      }

      .wd-explanation {
        flex: 1;
        min-width: 220px;
        max-width: 260px;
        text-align: left;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--color-ink);
        margin: 0;
        transition: opacity 0.5s ease;
      }

      .wd-explanation--hidden {
        opacity: 0;
        pointer-events: none;
      }

      .wd-answer {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .wd-answer--visible {
        opacity: 1;
        transform: translateX(0);
      }

      #vc-next {
        margin-top: 0.75rem;
        min-height: 1.2rem;
        line-height: 1.2rem;
      }
    </style>
  </head>
  <body>
    <aside id="toolbox" class="wd-toolbox"></aside>

    <div id="demo" class="wd-canvas"></div>

    <div class="wd-explanation">
      <span><strong>What is a <em>Value Chain</em>?</strong><br/></span>
      <span id="vc-answer" class="wd-answer">A <em>Value Chain</em> shows how <em>Users</em> get their <em>User Needs</em> met, as a result of the <em>Capabilities</em> they depend on.</span>
      <div id="vc-next"></div>
    </div>

    <script type="module">
      import WardleyDemo from "/src/index.ts";
      import { attachAutopilot, parseSkipTarget } from "/src/dev/autopilot.ts";
      const answer = document.getElementById("vc-answer");
      const explanation = document.querySelector(".wd-explanation");
      const toolbox = document.getElementById("toolbox");
      const nextControl = document.getElementById("vc-next");

      // Dev-only test shortcut: reload with ?skipTo=phase1 | celebrate | phase2 to jump
      // straight past earlier phases instead of replaying drag + 5 form fields by hand.
      const skipTarget = parseSkipTarget(location.search);
      const autopilot = skipTarget
        ? attachAutopilot({ toolbox, nextControl, target: skipTarget })
        : undefined;

      WardleyDemo.demos.userNeedDependency({
        canvas: document.getElementById("demo"),
        toolbox,
        nextControl,
        onNeedPlaced: () => answer.classList.add("wd-answer--visible"),
        onEvolutionReady: () => explanation.classList.add("wd-explanation--hidden"),
        onMount: autopilot?.onMount,
      });
    </script>
  </body>
</html>
