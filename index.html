<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        position: relative;
        display: flex;
        align-items: flex-start;
      }

      .wd-instance {
        display: flex;
        align-items: flex-start;
        flex: 1;
      }

      /*
       * No horizontal auto-centering: an auto-centered canvas would re-center (jump) if its width
       * ever changed, dragging every node with it.
       */
      .wd-canvas {
        flex: 1;
        margin: 4rem 0;
      }

    </style>
  </head>
  <body>
    <div id="demo-section" class="wd-instance">
      <div id="demo" class="wd-canvas">
        <div id="mascot-host" class="wd-mascot-host"></div>
      </div>
    </div>

    <script type="module">
      import WardleyDemo from "/src/index.ts";
      import { attachAutopilot, parseSkipTarget } from "/src/dev/autopilot.ts";
      const mascotHost = document.getElementById("mascot-host");

      // Dev-only test shortcut: reload with ?skipTo=phase10 | celebrate | phase20 | finale | thinking
      // to jump straight past earlier phases instead of replaying drag + 5 form fields by hand.
      const skipTarget = parseSkipTarget(location.search);
      const autopilot = skipTarget ? attachAutopilot({ mascotHost, target: skipTarget }) : undefined;

      WardleyDemo.demos.userNeedDependency({
        canvas: document.getElementById("demo"),
        mascotHost,
        onMount: autopilot?.onMount,
        onEvolutionStep: autopilot?.onEvolutionStep,
      });
    </script>
  </body>
</html>
