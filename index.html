<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
      }

      .wd-toolbox {
        width: 140px;
        min-height: 100vh;
        background: #f5f5f5;
        border-right: 1px solid #e5e5e5;
        padding: 1.25rem 0.75rem;
        flex-shrink: 0;
      }

      .wd-toolbox-title {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #888;
        margin: 0 0 1rem;
        text-align: center;
      }

      .wd-toolbox-slot {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        padding: 0.75rem 0.5rem;
        margin-bottom: 0.5rem;
        border: 1px dashed #d1d5db;
        border-radius: 8px;
        background: #fff;
        cursor: not-allowed;
        user-select: none;
      }

      .wd-toolbox-slot svg {
        width: 48px;
        height: 48px;
        filter: grayscale(1);
        opacity: 0.4;
      }

      .wd-toolbox-slot circle {
        fill: #fff;
        stroke: #1a1a1a;
        stroke-width: 1.5;
      }

      .wd-toolbox-slot text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        fill: #1a1a1a;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .wd-toolbox-slot-label {
        font-size: 0.7rem;
        color: #999;
      }

      .wd-toolbox-lock {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #fff;
        border: 1px solid #d1d5db;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        line-height: 1;
      }

      .wd-toolbox-slot--active {
        border: 1px solid #005f99;
        background: #f0f7ff;
        cursor: grab;
        touch-action: none;
      }

      .wd-toolbox-slot--active:active {
        cursor: grabbing;
      }

      .wd-toolbox-slot--active svg {
        filter: none;
        opacity: 1;
      }

      .wd-toolbox-slot--active circle {
        animation: wd-toolbox-pulse 1.8s ease-in-out infinite;
      }

      .wd-toolbox-slot--active .wd-toolbox-slot-label {
        color: #005f99;
        font-weight: 600;
      }

      @keyframes wd-toolbox-pulse {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(0, 95, 153, 0)); }
        50% { filter: drop-shadow(0 0 6px rgba(0, 95, 153, 0.55)); }
      }

      .wd-canvas {
        flex: 1;
        max-width: 500px;
        margin: 4rem auto;
      }
    </style>
  </head>
  <body>
    <aside class="wd-toolbox">
      <p class="wd-toolbox-title">Nodes</p>

      <div class="wd-toolbox-slot" title="Not available yet">
        <span class="wd-toolbox-lock">🔒</span>
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">User</text></svg>
        <span class="wd-toolbox-slot-label">Who It's For</span>
      </div>

      <div class="wd-toolbox-slot wd-toolbox-slot--active" title="Drag this onto the canvas">
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">Need</text></svg>
        <span class="wd-toolbox-slot-label">What They Get</span>
      </div>

      <div class="wd-toolbox-slot" title="Not available yet">
        <span class="wd-toolbox-lock">🔒</span>
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">Dep.</text></svg>
        <span class="wd-toolbox-slot-label">How They Get It</span>
      </div>
    </aside>

    <div id="demo" class="wd-canvas"></div>

    <script type="module">
      import WardleyDemo from "/src/index.ts";
      WardleyDemo.mount(document.getElementById("demo"), WardleyDemo.demos.userNeedDependency, {
        dragHandle: document.querySelector(".wd-toolbox-slot--active"),
      });
    </script>
  </body>
</html>
