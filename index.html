<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
      }

      .wd-toolbox {
        width: 140px;
        min-height: 100vh;
        background: #f5f5f5;
        border-right: 1px solid #e5e5e5;
        padding: 1.25rem 0.75rem;
        flex-shrink: 0;
      }

      .wd-toolbox-slot {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        padding: 0.75rem 0.5rem;
        margin-bottom: 0.5rem;
        border: 1px dashed #d1d5db;
        border-radius: 8px;
        background: #fff;
        cursor: not-allowed;
        user-select: none;
      }

      .wd-toolbox-slot svg {
        width: 64px;
        height: 64px;
        filter: grayscale(1);
        opacity: 0.4;
      }

      .wd-toolbox-slot circle {
        fill: #fff;
        stroke: #1a1a1a;
        stroke-width: 1.5;
      }

      .wd-toolbox-slot text {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        fill: #1a1a1a;
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .wd-toolbox-slot-label {
        font-size: 0.7rem;
        color: #999;
      }

      .wd-toolbox-slot--active {
        border: 1px solid #005f99;
        background: #f0f7ff;
        cursor: grab;
        touch-action: none;
      }

      .wd-toolbox-slot--active:active {
        cursor: grabbing;
      }

      .wd-toolbox-slot--active svg {
        filter: none;
        opacity: 1;
      }

      .wd-toolbox-slot--active circle {
        animation: wd-toolbox-pulse 1.8s ease-in-out infinite;
      }

      .wd-toolbox-slot--active .wd-toolbox-slot-label {
        color: #005f99;
        font-weight: 600;
      }

      @keyframes wd-toolbox-pulse {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(0, 95, 153, 0)); }
        50% { filter: drop-shadow(0 0 6px rgba(0, 95, 153, 0.55)); }
      }

      .wd-canvas {
        flex: 1;
        max-width: 500px;
        margin: 4rem auto;
      }

      .wd-explanation {
        flex: 1;
        min-width: 220px;
        max-width: 260px;
        text-align: left;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--color-ink);
        margin: 0;
      }

      .wd-answer {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .wd-answer--visible {
        opacity: 1;
        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <aside class="wd-toolbox">
      <div class="wd-toolbox-slot" title="Not available yet">
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">User</text></svg>
        <span class="wd-toolbox-slot-label">Who It's For</span>
      </div>

      <div class="wd-toolbox-slot wd-toolbox-slot--active" title="Drag this onto the canvas">
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">User Need</text></svg>
        <span class="wd-toolbox-slot-label">What They Get</span>
      </div>

      <div class="wd-toolbox-slot" title="Not available yet">
        <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">Capability</text></svg>
        <span class="wd-toolbox-slot-label">How They Get It</span>
      </div>
    </aside>

    <div id="demo" class="wd-canvas"></div>

    <p class="wd-explanation">
      <span><strong>What is a <em>Value Chain</em>?</strong><br/></span>
      <span id="vc-answer" class="wd-answer">A <em>Value Chain</em> shows how <em>Users</em> get their <em>User Needs</em> met, as a result of the <em>Capabilities</em> they depend on.</span>
    </p>

    <script type="module">
      import WardleyDemo from "/src/index.ts";
      const dragHandle = document.querySelector(".wd-toolbox-slot--active");
      const answer = document.getElementById("vc-answer");
      WardleyDemo.mount(
        document.getElementById("demo"),
        {
          ...WardleyDemo.demos.userNeedDependency,
          onComplete: () => {
            dragHandle.classList.remove("wd-toolbox-slot--active");
            dragHandle.title = "Not available yet";
            setTimeout(() => explanation.classList.add("wd-answer--visible"), 500);
          },
        },
        { dragHandle },
      );

      document.querySelectorAll(".wd-toolbox-slot text").forEach((text) => {
        WardleyDemo.fitNodeLabel(text, 26);
      });
    </script>
  </body>
</html>
