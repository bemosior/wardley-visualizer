<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
      }

      .wd-instance {
        display: flex;
        align-items: flex-start;
        flex: 1;
      }

      .wd-toolbox {
        width: 140px;
        background: #f5f5f5;
        border-right: 1px solid #e5e5e5;
        padding: 1.25rem 0.75rem;
        flex-shrink: 0;
      }

      /*
       * No horizontal auto-centering: the canvas always sits flush against the toolbox, so its
       * left edge never moves when .wd-canvas--expanded later lifts max-width — only the right
       * edge grows into the space the explanation column frees up. An auto-centered canvas would
       * instantly re-center (jump) the instant its width changed, dragging every node with it.
       */
      .wd-canvas {
        flex: 1;
        max-width: 500px;
        margin: 4rem 0;
      }

      .wd-canvas--expanded {
        max-width: none;
      }

      .wd-explanation {
        flex: 1;
        min-width: 220px;
        max-width: 260px;
        text-align: left;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--color-ink);
        margin: 0;
        transition: opacity 0.5s ease;
      }

      /*
       * Collapses out of the flex layout instantly (no transition on the sizing properties) so
       * .wd-canvas can claim the freed space and have its final size measurable synchronously —
       * see showMapBackdrop()'s JS-side viewBox width calculation, which needs the layout to have
       * already settled by the time it runs.
       */
      .wd-explanation--hidden {
        opacity: 0;
        pointer-events: none;
        flex: 0 1 0;
        min-width: 0;
        max-width: 0;
        max-height: 0;
        margin: 0;
        overflow: hidden;
      }

      .wd-answer {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .wd-answer--visible {
        opacity: 1;
        transform: translateX(0);
      }

      #vc-next {
        margin-top: 0.75rem;
        min-height: 1.2rem;
        line-height: 1.2rem;
      }
    </style>
  </head>
  <body>
    <div class="wd-instance">
      <aside id="toolbox" class="wd-toolbox"></aside>
      <div id="demo" class="wd-canvas"></div>
    </div>

    <div class="wd-explanation">
      <span><strong>What is a <em>Value Chain</em>?</strong><br/></span>
      <span id="vc-answer" class="wd-answer">A <em>Value Chain</em> shows how <em>Users</em> get their <em>User Needs</em> met, as a result of the <em>Capabilities</em> they depend on.</span>
      <div id="vc-next"></div>
    </div>

    <script type="module">
      import WardleyDemo from "/src/index.ts";
      import { attachAutopilot, parseSkipTarget } from "/src/dev/autopilot.ts";
      const answer = document.getElementById("vc-answer");
      const explanation = document.querySelector(".wd-explanation");
      const toolbox = document.getElementById("toolbox");
      const nextControl = document.getElementById("vc-next");

      // Dev-only test shortcut: reload with ?skipTo=phase1 | celebrate | phase2 to jump
      // straight past earlier phases instead of replaying drag + 5 form fields by hand.
      const skipTarget = parseSkipTarget(location.search);
      const autopilot = skipTarget
        ? attachAutopilot({ toolbox, nextControl, target: skipTarget })
        : undefined;

      WardleyDemo.demos.userNeedDependency({
        canvas: document.getElementById("demo"),
        toolbox,
        nextControl,
        onNeedPlaced: () => answer.classList.add("wd-answer--visible"),
        onEvolutionReady: () => {
          explanation.classList.add("wd-explanation--hidden");
          document.getElementById("demo").classList.add("wd-canvas--expanded");
        },
        onMount: autopilot?.onMount,
      });
    </script>
  </body>
</html>
