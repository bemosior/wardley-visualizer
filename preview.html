<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Host-styled Preview</title>
    <style>
      /* mirrors lwm-html src/static/style.css tokens — keep in sync manually */
      :root {
        --color-ink: #1a1a1a;
        --color-link: #005f99;
        --color-link-hover: #003d6b;
        --color-border: #e5e5e5;
        --color-bg-soft: #f5f5f5;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      /* lwm-html sets this on `html` (not just `body`) -- every rem-sized value in the widget's own
         styles.ts (the mascot caption, its "Next" button, etc.) resolves against the *root* font
         size, not body's, so leaving this unset was silently under-simulating production's real
         type scale and hiding at least one host-only mascot-placement bug (see styles.ts's
         `.wd-mascot-caption` comment). */
      html {
        font-size: 18px;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 18px;
        line-height: 1.7;
        color: var(--color-ink);
      }
      .hero {
        padding: 5rem 1.5rem 2rem;
        text-align: center;
        background: #fff;
      }
      .hero-inner {
        max-width: 740px;
        margin: 0 auto;
      }
      .hero h2 {
        font-family: var(--font-ui);
        font-size: 2.5rem;
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-ink);
        margin: 0 0 1rem;
      }
      .hero-sub {
        font-size: 1.1rem;
        color: #444;
        margin: 0 0 1.5rem;
        font-family: var(--font-ui);
      }
      .demo-row {
        display: flex;
        align-items: center;
        gap: 2rem;
        justify-content: flex-start;
        flex-wrap: wrap;
      }

      .wd-instance {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        flex: 1;
        min-width: 280px;
      }

      .wd-instance .wd-canvas {
        width: 100%;
      }

      /* dev-only chrome, not part of the simulated host embed */
      .wd-dev-skip {
        position: fixed;
        top: 0.5rem;
        right: 0.5rem;
        font-family: var(--font-ui);
        font-size: 0.75rem;
        color: #888;
        background: #fff;
        border: 1px solid var(--color-border);
        border-radius: 6px;
        padding: 0.35rem 0.5rem;
        z-index: 10;
      }
      .wd-dev-skip select {
        font-size: 0.75rem;
        margin-left: 0.35rem;
      }

      /* draft: end credits, scrolling like a game/Patreon-video outro. Anchored to the map's
         top-right corner -- clear of the mascot/nodes by the time the finale reaches this point --
         instead of sitting in page flow below the map, so it's visible without scrolling.
         A child of #demo-a (which the engine promotes to position:relative via its own
         .wardley-demo-root class at mount time -- see WardleyDemo.ts's constructor), so top/right
         here are relative to the map canvas itself.
         Hidden until the mascot's closing "Nice work!" recap fires (onComplete). */
      .credits {
        display: none;
        position: absolute;
        top: 0.75rem;
        right: 0.75rem;
        width: 180px;
        max-width: 55%;
        z-index: 5;
        box-sizing: border-box;
        background: #111;
        color: #eee;
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
        padding: 0.85rem 1rem;
        text-align: center;
      }
      .credits.is-visible {
        display: block;
        animation: credits-fade-in 0.6s ease;
      }
      @keyframes credits-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .credits-heading {
        font-family: var(--font-ui);
        font-size: 0.65rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #999;
        margin: 0 0 0.6rem;
      }
      .credits-scroll {
        height: 100px;
        overflow: hidden;
        position: relative;
        mask-image: linear-gradient(to bottom, transparent, #000 15%, #000 85%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, transparent, #000 15%, #000 85%, transparent);
      }
      .credits-scroll ul {
        list-style: none;
        margin: 0;
        padding: 0;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        animation: credits-scroll-up 14s linear infinite;
      }
      .credits-scroll li {
        font-family: var(--font-ui);
        font-size: 0.8rem;
        padding: 0.3rem 0;
      }
      @keyframes credits-scroll-up {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-100%);
        }
      }
    </style>
  </head>
  <body>
    <div class="wd-dev-skip">
      <label>Dev: skip to
        <select id="dev-skip-select">
          <option value="">(none)</option>
          <option value="intro">Mascot intro</option>
          <option value="phase10">Phase 10 form</option>
          <option value="celebrate">Celebration</option>
          <option value="phase20">Phase 20 gate</option>
          <option value="finale">Placement finale</option>
          <option value="thinking">Thinking finale</option>
          <option value="recap">Recap</option>
        </select>
      </label>
    </div>

    <section class="hero">
      <div class="hero-inner">
        <div class="demo-row">
          <div class="wd-instance">
            <div id="demo-a" class="wd-canvas">
              <div id="mascot-avatar-host-a" class="wd-mascot-avatar-host"></div>
              <section class="credits">
                <p class="credits-heading">Thank you to everyone who gave feedback</p>
                <div class="credits-scroll">
                  <ul>
                    <li>James Fairbairn</li>
                    <li>Joel Tosi</li>
                    <li>Josh Kruszynski</li>
                    <li>Michael Lindqvist</li>
                    <li>Pablo Gil</li>
                    <li>Rian Porter</li>
                    <li>Tom Geraghty</li>
                    <li>Velocirachael</li>
                    <li>Henk Oudman</li>
                    <li>Tristan Slominski</li>
                  </ul>
                </div>
              </section>
            </div>
            <div id="mascot-dialog-host-a" class="wd-mascot-dialog-host"></div>
          </div>
        </div>
      </div>
    </section>

    <script src="./dist/wardley-demo.js"></script>
    <script>
      var avatarHost = document.getElementById("mascot-avatar-host-a");
      var dialogHost = document.getElementById("mascot-dialog-host-a");

      // Dev-only test shortcut: pick a moment from the dropdown (or load with
      // ?skipTo=intro|phase10|celebrate|phase20|finale|thinking|recap) to jump straight past earlier phases
      // instead of replaying drag + 5 form fields + two "Next" clicks by hand.
      var skipSelect = document.getElementById("dev-skip-select");
      var skipTarget = WardleyDemo.dev.parseSkipTarget(location.search);
      if (skipTarget) skipSelect.value = skipTarget;
      skipSelect.addEventListener("change", function () {
        var url = new URL(location.href);
        if (skipSelect.value) {
          url.searchParams.set("skipTo", skipSelect.value);
        } else {
          url.searchParams.delete("skipTo");
        }
        location.href = url.toString();
      });
      var autopilot = skipTarget
        ? WardleyDemo.dev.attachAutopilot({ avatarHost: avatarHost, dialogHost: dialogHost, target: skipTarget })
        : undefined;

      WardleyDemo.demos.userNeedDependency({
        canvas: document.getElementById("demo-a"),
        avatarHost: avatarHost,
        dialogHost: dialogHost,
        onMount: autopilot && autopilot.onMount,
        onEvolutionStep: autopilot && autopilot.onEvolutionStep,
        // Reveal the end credits only once the mascot's closing "Nice work!" recap fires.
        onComplete: function () {
          document.querySelector(".credits").classList.add("is-visible");
        },
        config: {
          viewBox: { width: 400, height: 520 },
          snapThreshold: 30,
          nodes: [
            { id: "user", label: "Someone we care about", x: 200, y: 100, draggable: false },
            { id: "need", label: "Something they need", x: 200, y: 284, draggable: true, start: { x: 25, y: 237 } },
            { id: "dependency-1", label: "Something that satisfies their need", x: 200, y: 468, draggable: false },
          ],
          connections: [
            { from: "user", to: "need" },
            { from: "need", to: "dependency-1" },
          ]
        },
      });
    </script>
  </body>
</html>
