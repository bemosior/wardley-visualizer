<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Host-styled Preview</title>
    <style>
      /* mirrors lwm-html src/static/style.css tokens — keep in sync manually */
      :root {
        --color-ink: #1a1a1a;
        --color-link: #005f99;
        --color-link-hover: #003d6b;
        --color-border: #e5e5e5;
        --color-bg-soft: #f5f5f5;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 18px;
        line-height: 1.7;
        color: var(--color-ink);
      }
      .hero {
        padding: 5rem 1.5rem 2rem;
        text-align: center;
        background: #fff;
      }
      .hero-inner {
        max-width: 740px;
        margin: 0 auto;
      }
      .hero h2 {
        font-family: var(--font-ui);
        font-size: 2.5rem;
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-ink);
        margin: 0 0 1rem;
      }
      .hero-sub {
        font-size: 1.1rem;
        color: #444;
        margin: 0 0 1.5rem;
        font-family: var(--font-ui);
      }
      .demo-row {
        display: flex;
        align-items: center;
        gap: 2rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .wd-instance {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        flex: 1;
        min-width: 280px;
        max-width: 380px;
      }

      .wd-instance .wd-canvas {
        flex: 1;
        max-width: 260px;
      }

      /* compact toolbox, mirrors index.html's dev sandbox but card-style (not a full-height sidebar) */
      .wd-toolbox {
        width: 110px;
        flex-shrink: 0;
        background: var(--color-bg-soft);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1rem 0.5rem;
      }

      .wd-explanation {
        flex: 1;
        min-width: 220px;
        max-width: 260px;
        text-align: left;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--color-ink);
        margin: 0;
      }
      .wd-answer {
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .wd-answer--visible {
        opacity: 1;
        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="hero-inner">
        <div class="demo-row">
          <div class="wd-instance">
            <aside id="toolbox-a" class="wd-toolbox"></aside>
            <div id="demo-a" class="wd-canvas"></div>
          </div>

          <p class="wd-explanation">
            <span><strong>What is a <em>Value Chain</em>?</strong><br/></span>
            <span id="vc-answer" class="wd-answer">A <em>Value Chain</em> shows how <em>Users</em> get their <em>User Needs</em> met, as a result of the <em>Capabilities</em> they depend on.</span>
          </p>
        </div>
      </div>
    </section>

    <script src="./dist/wardley-demo.js"></script>
    <script>
      var answer = document.getElementById("vc-answer");
      WardleyDemo.demos.userNeedDependency({
        canvas: document.getElementById("demo-a"),
        toolbox: document.getElementById("toolbox-a"),
        onCelebrate: function () {
          setTimeout(function () {
            answer.classList.add("wd-answer--visible");
          }, 500);
        },
        config: {
          viewBox: { width: 400, height: 520 },
          snapThreshold: 30,
          nodes: [
            { id: "user", label: "User", x: 200, y: 100, draggable: false },
            { id: "need", label: "User Need", x: 200, y: 284, draggable: true, start: { x: 25, y: 237 } },
            { id: "capability-1", label: "Capability", x: 130, y: 450, draggable: false },
            { id: "capability-2", label: "Capability", x: 270, y: 450, draggable: false },
            { id: "capability-3", label: "Capability", x: 200, y: 550, draggable: false },
          ],
          connections: [
            { from: "user", to: "need" },
            { from: "need", to: "capability-1" },
            { from: "need", to: "capability-2" },
            { from: "need", to: "capability-3" },
          ],
        },
      });
    </script>
  </body>
</html>
