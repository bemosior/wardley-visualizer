<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Host-styled Preview</title>
    <style>
      /* mirrors lwm-html src/static/style.css tokens — keep in sync manually */
      :root {
        --color-ink: #1a1a1a;
        --color-link: #005f99;
        --color-link-hover: #003d6b;
        --color-border: #e5e5e5;
        --color-bg-soft: #f5f5f5;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 18px;
        line-height: 1.7;
        color: var(--color-ink);
      }
      .hero {
        padding: 5rem 1.5rem 2rem;
        text-align: center;
        background: #fff;
      }
      .hero-inner {
        max-width: 740px;
        margin: 0 auto;
      }
      .hero h2 {
        font-family: var(--font-ui);
        font-size: 2.5rem;
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-ink);
        margin: 0 0 1rem;
      }
      .hero-sub {
        font-size: 1.1rem;
        color: #444;
        margin: 0 0 1.5rem;
        font-family: var(--font-ui);
      }
      .demo-row {
        display: flex;
        gap: 2rem;
        justify-content: center;
        flex-wrap: wrap;
      }

      .wd-instance {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        flex: 1;
        min-width: 280px;
        max-width: 380px;
      }

      .wd-instance .wd-canvas {
        flex: 1;
        max-width: 260px;
      }

      /* compact toolbox, mirrors index.html's dev sandbox but card-style (not a full-height sidebar) */
      .wd-toolbox {
        width: 110px;
        flex-shrink: 0;
        background: var(--color-bg-soft);
        border: 1px solid var(--color-border);
        border-radius: 8px;
        padding: 1rem 0.5rem;
      }

      .wd-toolbox-slot {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.3rem;
        padding: 0.5rem 0.4rem;
        margin-bottom: 0.4rem;
        border: 1px dashed #d1d5db;
        border-radius: 6px;
        background: #fff;
        cursor: not-allowed;
        user-select: none;
      }

      .wd-toolbox-slot:last-child {
        margin-bottom: 0;
      }

      .wd-toolbox-slot svg {
        width: 36px;
        height: 36px;
        filter: grayscale(1);
        opacity: 0.4;
      }

      .wd-toolbox-slot circle {
        fill: #fff;
        stroke: var(--color-ink);
        stroke-width: 1.5;
      }

      .wd-toolbox-slot text {
        font-family: var(--font-ui);
        font-size: 10px;
        fill: var(--color-ink);
        text-anchor: middle;
        dominant-baseline: middle;
      }

      .wd-toolbox-slot-label {
        font-family: var(--font-ui);
        font-size: 0.65rem;
        color: #999;
      }

      .wd-toolbox-slot--active {
        border: 1px solid var(--color-link);
        background: #f0f7ff;
        cursor: grab;
        touch-action: none;
      }

      .wd-toolbox-slot--active:active {
        cursor: grabbing;
      }

      .wd-toolbox-slot--active svg {
        filter: none;
        opacity: 1;
      }

      .wd-toolbox-slot--active circle {
        animation: wd-toolbox-pulse 1.8s ease-in-out infinite;
      }

      .wd-toolbox-slot--active .wd-toolbox-slot-label {
        color: var(--color-link);
        font-weight: 600;
      }

      @keyframes wd-toolbox-pulse {
        0%, 100% { filter: drop-shadow(0 0 0 rgba(0, 95, 153, 0)); }
        50% { filter: drop-shadow(0 0 6px rgba(0, 95, 153, 0.55)); }
      }

      .wd-explanation {
        flex: 1;
        min-width: 220px;
        max-width: 260px;
        text-align: left;
        font-size: 1.05rem;
        line-height: 1.6;
        color: var(--color-ink);
        margin: 1.5rem 0 0;
        opacity: 0;
        transform: translateX(8px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .wd-explanation--visible {
        opacity: 1;
        transform: translateX(0);
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="hero-inner">
        <h2>What is a Wardley Map?</h2>
        <p class="hero-sub">Drag the missing piece into place.</p>
        <div class="demo-row">
          <div class="wd-instance">
            <aside class="wd-toolbox">
              <div class="wd-toolbox-slot" title="Not available yet">
                <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">User</text></svg>
                <span class="wd-toolbox-slot-label">Who It's For</span>
              </div>
              <div class="wd-toolbox-slot wd-toolbox-slot--active" title="Drag this onto the canvas">
                <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">User Need</text></svg>
                <span class="wd-toolbox-slot-label">What They Get</span>
              </div>
              <div class="wd-toolbox-slot" title="Not available yet">
                <svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" /><text x="32" y="33">Capability</text></svg>
                <span class="wd-toolbox-slot-label">How They Get It</span>
              </div>
            </aside>
            <div id="demo-a" class="wd-canvas"></div>
          </div>
          <p id="explanation" class="wd-explanation">
            Users depend on the fulfillment of their User Needs, which depend on the Capabilities
            that come together to meet them.
          </p>
        </div>
      </div>
    </section>

    <script src="./dist/wardley-demo.js"></script>
    <script>
      var config = {
        viewBox: { width: 400, height: 520 },
        snapThreshold: 30,
        nodes: [
          { id: "user", label: "User", x: 200, y: 82, draggable: false },
          { id: "need", label: "User Need", x: 200, y: 237, draggable: true, start: { x: 25, y: 237 } },
          { id: "dependency-1", label: "Capability", x: 130, y: 392, draggable: false },
          { id: "dependency-2", label: "Capability", x: 270, y: 392, draggable: false },
        ],
        connections: [
          { from: "user", to: "need" },
          { from: "need", to: "dependency-1" },
          { from: "need", to: "dependency-2" },
        ],
      };

      var dragHandle = document.querySelector(".wd-toolbox-slot--active");
      var explanation = document.getElementById("explanation");
      config.onComplete = function () {
        dragHandle.classList.remove("wd-toolbox-slot--active");
        dragHandle.title = "Not available yet";
        explanation.classList.add("wd-explanation--visible");
      };

      WardleyDemo.mount(document.getElementById("demo-a"), config, { dragHandle: dragHandle });
    </script>
  </body>
</html>
