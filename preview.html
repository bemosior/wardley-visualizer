<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wardley Demo — Host-styled Preview</title>
    <style>
      /* mirrors lwm-html src/static/style.css tokens — keep in sync manually */
      :root {
        --color-ink: #1a1a1a;
        --color-link: #005f99;
        --color-link-hover: #003d6b;
        --color-border: #e5e5e5;
        --color-bg-soft: #f5f5f5;
        --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 18px;
        line-height: 1.7;
        color: var(--color-ink);
      }
      .hero {
        padding: 5rem 1.5rem 2rem;
        text-align: center;
        background: #fff;
      }
      .hero-inner {
        max-width: 740px;
        margin: 0 auto;
      }
      .hero h2 {
        font-family: var(--font-ui);
        font-size: 2.5rem;
        font-weight: 800;
        line-height: 1.2;
        color: var(--color-ink);
        margin: 0 0 1rem;
      }
      .hero-sub {
        font-size: 1.1rem;
        color: #444;
        margin: 0 0 1.5rem;
        font-family: var(--font-ui);
      }
      .demo-row {
        display: flex;
        gap: 2rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .demo-row > div {
        flex: 1;
        min-width: 280px;
        max-width: 340px;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="hero-inner">
        <h2>What is a Wardley Map?</h2>
        <p class="hero-sub">Drag the missing piece into place.</p>
        <div class="demo-row">
          <div id="demo-a"></div>
          <div id="demo-b"></div>
        </div>
      </div>
    </section>

    <script src="./dist/wardley-demo.js"></script>
    <script>
      var config = {
        viewBox: { width: 400, height: 300 },
        snapThreshold: 30,
        nodes: [
          { id: "user", label: "User", x: 200, y: 40, draggable: false },
          { id: "need", label: "Need", x: 200, y: 160, draggable: true, start: { x: 350, y: 160 } },
          { id: "dependency-1", label: "Dependency", x: 130, y: 260, draggable: false },
          { id: "dependency-2", label: "Dependency", x: 270, y: 260, draggable: false },
        ],
        connections: [
          { from: "user", to: "need" },
          { from: "need", to: "dependency-1" },
          { from: "need", to: "dependency-2" },
        ],
      };

      WardleyDemo.mount(document.getElementById("demo-a"), config);
      WardleyDemo.mount(document.getElementById("demo-b"), JSON.parse(JSON.stringify(config)));
    </script>
  </body>
</html>
